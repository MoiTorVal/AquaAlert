name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      # Settings() loads at import time; tests provision their own Postgres
      # via testcontainers, so these only need to exist, not point anywhere.
      SECRET_KEY: ci-only-secret-key-long-enough-for-hs256
      DB_USER: ci
      DB_PASSWORD: ci
      DB_HOST: localhost
      DB_NAME: ci
      DB_PORT: "5432"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          # matches the project venv; shapely 2.0.6 has no 3.14 wheels yet
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with coverage gate
        run: pytest --cov=backend --cov-report=term-missing --cov-fail-under=97

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
